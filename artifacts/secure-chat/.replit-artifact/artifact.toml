kind = "web"
previewPath = "/"
title = "Secure Chat"
version = "1.0.0"
id = "artifacts/secure-chat"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24274

[services.development]
run = "pnpm --filter @workspace/secure-chat run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/secure-chat", "run", "build" ]
publicDir = "artifacts/secure-chat/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24274"
BASE_PATH = "/"
